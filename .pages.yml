media:
  input: public/uploads
  output: /uploads

content:
  - name: segments
    label: "Segmenter (Havbruk, Industri, Kommunal, Maritim)"
    type: collection
    path: src/content/segments
    view:
      fields: [title, lang, segmentKey]
    fields:
      - { name: lang, label: "Språk (IKKE ENDRE)", type: select, options: [en, no], required: true }
      - { name: segmentKey, label: "Segment-nøkkel (IKKE ENDRE — styrer hvilken side dette er)", type: select, options: [havbruk, industri, kommunal, maritim], required: true }
      - { name: slug, label: "URL-del (IKKE ENDRE)", type: string, required: true }
      - { name: title, label: "Tittel", type: string, required: true }
      - { name: excerpt, label: "Kort beskrivelse (vises på forsiden og i segmentkort)", type: text, required: true }
      - { name: heroImage, label: "Bildesti (IKKE ENDRE — bildeadministrasjon kommer senere)", type: string }
      - { name: heroImageAlt, label: "Alt-tekst for bilde", type: string }
      - name: stats
        label: "Nøkkeltall"
        type: object
        list: true
        fields:
          - { name: value, label: "Verdi (f.eks. 7x)", type: string }
          - { name: label, label: "Beskrivelse", type: string }
      - { name: relatedSolutions, label: "Relaterte løsninger", type: select, list: true, options: [daf, screw-press, biological-treatment, containerized-plant] }
      - { name: seoTitle, label: "SEO-tittel", type: string }
      - { name: seoDescription, label: "SEO-beskrivelse", type: text }
      - { name: order, label: "Rekkefølge (lavest tall vises først)", type: number }
      - { name: body, label: "Brødtekst", type: rich-text }

  - name: solutions
    label: "Løsninger (DAF, skruepresse, biologisk rensing, containerløsning)"
    type: collection
    path: src/content/solutions
    view:
      fields: [title, lang, solutionKey]
    fields:
      - { name: lang, label: "Språk (IKKE ENDRE)", type: select, options: [en, no], required: true }
      - { name: solutionKey, label: "Løsnings-nøkkel (IKKE ENDRE — styrer hvilken side dette er)", type: select, options: [daf, screw-press, biological-treatment, containerized-plant], required: true }
      - { name: slug, label: "URL-del (IKKE ENDRE)", type: string, required: true }
      - { name: title, label: "Tittel", type: string, required: true }
      - { name: excerpt, label: "Kort beskrivelse", type: text, required: true }
      - { name: image, label: "Bildesti (IKKE ENDRE — bildeadministrasjon kommer senere)", type: string }
      - { name: imageAlt, label: "Alt-tekst for bilde", type: string }
      - { name: technicalDetails, label: "Tekniske spesifikasjoner (collapsible seksjon — valgfritt)", type: rich-text }
      - { name: applicableSegments, label: "Brukes i segment", type: select, list: true, options: [havbruk, industri, kommunal, maritim] }
      - { name: seoTitle, label: "SEO-tittel", type: string }
      - { name: seoDescription, label: "SEO-beskrivelse", type: text }
      - { name: order, label: "Rekkefølge (lavest tall vises først)", type: number }
      - { name: body, label: "Brødtekst", type: rich-text }
