name: Auto-translate content

on:
  push:
    branches: [main]
    paths:
      - "src/content/segments/*.en.md"
      - "src/content/segments/*.no.md"
      - "src/content/solutions/*.en.md"
      - "src/content/solutions/*.no.md"

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    if: "!contains(github.event.head_commit.message, 'Auto-translate updated content')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Translate changed content into its sibling language
        id: translate
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: node scripts/translate.mjs

      - name: Open a PR with the translated draft(s)
        if: steps.translate.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Auto-translate updated content (needs review)"
          title: "Auto-translated content update — needs review"
          body: |
            Automatisk oversatt utkast generert av DeepL etter en endring i innholdet.

            **Sjekk teksten før du godkjenner** — spesielt formuleringer og eventuelle
            markdown-formateringsfeil fra oversettelsen. Slå sammen (merge) denne PR-en
            når teksten ser riktig ut, eller lukk den uten å slå sammen om oversettelsen
            ikke skal brukes.
          branch: auto-translate/${{ github.sha }}
          labels: auto-translate
